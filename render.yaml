services:
  - type: web
    name: shopeasy
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ecommerce_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        value: django-insecure-render-secret-key-change-this
      - key: DEBUG
        value: "False"